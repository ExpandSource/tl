name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 버전 추출
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Makefile 버전 동기화
        run: sed -i "s/^VERSION = .*/VERSION = ${{ steps.version.outputs.version }}/" Makefile

      - name: 빌드
        run: make

      - name: tarball 생성
        run: make dist

      - name: .deb 생성
        run: make deb

      - name: GitHub Release 생성 및 업로드
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            dist/tl-${{ steps.version.outputs.version }}.tar.gz
            dist/tl_${{ steps.version.outputs.version }}.deb
            install.sh
